name: hbt_timesheet
description: HBT Group Timesheet Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.5.0

  # Local storage (JWT token)
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5

  # Excel export (Timesheet Report -> monthly hours .xlsx)
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
